<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza 6 | Countdown JP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .jp-font {
            font-family: 'Noto Sans JP', sans-serif;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.7), 0 0 20px rgba(255, 0, 85, 0.5);
        }

        .bg-pattern {
            background-image: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.85)), url('https://images.unsplash.com/photo-1542202229-7d93c33f5d07?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .card-blur {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(255, 0, 85, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col justify-center items-center p-6 relative">
    <div class="scanline"></div>

    <!-- Header / Title -->
    <header class="text-center mb-12 relative z-20">
        <h2 class="jp-font text-pink-600 text-sm tracking-[0.3em] font-bold mb-2">フォルツァ モータースポーツ 6</h2>
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter italic">FORZA <span class="text-pink-600">6</span></h1>
        <p class="text-gray-400 mt-4 uppercase tracking-widest text-xs">Lançamento Mundial • 19 de Maio de 2026</p>
    </header>

    <!-- Main Countdown -->
    <main class="w-full max-w-4xl grid grid-cols-2 md:grid-cols-4 gap-4 z-20">
        <div class="card-blur rounded-xl p-8 flex flex-col items-center justify-center transition-all hover:border-pink-600/50">
            <span id="days" class="text-5xl md:text-6xl font-bold mb-1">00</span>
            <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Dias</span>
            <span class="jp-font text-[10px] text-pink-900 mt-1">日</span>
        </div>
        <div class="card-blur rounded-xl p-8 flex flex-col items-center justify-center transition-all hover:border-pink-600/50">
            <span id="hours" class="text-5xl md:text-6xl font-bold mb-1">00</span>
            <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Horas</span>
            <span class="jp-font text-[10px] text-pink-900 mt-1">時間</span>
        </div>
        <div class="card-blur rounded-xl p-8 flex flex-col items-center justify-center transition-all hover:border-pink-600/50">
            <span id="minutes" class="text-5xl md:text-6xl font-bold mb-1">00</span>
            <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Minutos</span>
            <span class="jp-font text-[10px] text-pink-900 mt-1">分</span>
        </div>
        <div class="card-blur rounded-xl p-8 flex flex-col items-center justify-center transition-all hover:border-pink-600/50">
            <span id="seconds" class="text-5xl md:text-6xl font-bold mb-1 text-pink-600 neon-text">00</span>
            <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Segundos</span>
            <span class="jp-font text-[10px] text-pink-900 mt-1">秒</span>
        </div>
    </main>

    <!-- Details / Footer -->
    <footer class="mt-16 text-center z-20">
        <div class="flex items-center justify-center gap-4 mb-4 opacity-50">
            <div class="h-[1px] w-12 bg-gray-500"></div>
            <span class="jp-font text-xs tracking-widest">速度と情熱</span>
            <div class="h-[1px] w-12 bg-gray-500"></div>
        </div>
        <p class="text-[10px] text-gray-600 uppercase tracking-widest">Aguardando a próxima geração da simulação.</p>
    </footer>

    <!-- Japanese Accents (Floating Kanji) -->
    <div class="fixed bottom-10 left-10 opacity-10 pointer-events-none hidden lg:block">
        <h3 class="jp-font text-8xl font-black">レース</h3>
    </div>
    <div class="fixed top-10 right-10 opacity-10 pointer-events-none hidden lg:block text-right">
        <h3 class="jp-font text-8xl font-black">東京</h3>
    </div>

    <script>
        // Data do lançamento do Forza 6
        const targetDate = new Date("May 19, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.querySelector("main").innerHTML = `
                    <div class="col-span-full card-blur rounded-xl p-12 text-center">
                        <h2 class="text-4xl font-bold text-pink-600 neon-text italic mb-2">DISPONÍVEL AGORA</h2>
                        <p class="jp-font text-gray-400 uppercase tracking-widest">Vá para a pista!</p>
                    </div>
                `;
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Atualiza a cada segundo
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
